version: 2

updates:
  # frontend (npm)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-production-deps:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      frontend-dev-deps:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # backend (gradle)
  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "dependencies"
      - "backend"