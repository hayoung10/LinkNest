spring:
  application:
    name: linknest-backend
  profiles:
    group:
      dev: [dev-config, commons, secret]
      prod: [prod-config, commons, secret]
      test: [test-config, commons]

--- #commons 공통 설정
server:
  port: 8080
spring:
  config:
    activate:
      on-profile: commons
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 개발용, 운영 환경에서는 제거 예정
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
        show_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    issuer: linknest
    audience: linknest-client
    access-exp-minutes: 15
    refresh-exp-days: 7
    header: Authorization
    prefix: Bearer
    clock-skew-seconds: 60
  tag-unused:
    enabled: false
    cron: "0 0 3 * * *"
    zone: "Asia/Seoul"
    batch-size: 500
    ttl-days: 1
  trash:
    enabled: true
    cron: "0 0 4 * * *"
    zone: "Asia/Seoul"
    batch-size: 300
    ttl-days: 15

storage:
  provider: local

--- #dev-config
spring:
  config:
    activate:
      on-profile: dev-config
  datasource:
    url: jdbc:mysql://localhost:3310/linknest?characterEncoding=UTF-8&sessionVariables=time_zone=UTC
  data:
    redis:
      host: localhost
      port: 6380
      timeout: 5000

app:
  frontend:
    oauth2-success-redirect: "http://localhost:5173/redirect"
  tag-unused:
    enabled: false
    # cron: "0 */1 * * * *" #테스트용
  trash:
    enabled: false
    # cron: "0 */1 * * * *" #테스트용

storage:
  local:
    base-path: /home/hayoung/dev-storage/linknest
    base-url: http://localhost:8080/files

logging:
  level:
    root: info
    org.springframework.web: info
    org.springframework.security: debug
    org.hibernate.SQL: warn
    org.hibernate.type: warn
    com.linknest: debug

--- #prod-config
spring:
  config:
    activate:
      on-profile: prod-config
  flyway:
    clean-disabled: true

app:
  tag-unused:
    enabled: true
  trash:
    enabled: true

logging:
  level:
    root: warn
    org.springframework.web: warn
    org.springframework.security: warn
    org.hibernate.SQL: warn
    org.hibernate.type: warn
    com.linknest: info

storage:
  s3:
    bucket: linknest-profile-bucket
    base-url: https://cdn.example.com # TODO: prod에서 실제 CDN 도메인으로 교체
    region: ap-northeast-2