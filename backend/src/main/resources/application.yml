spring:
  application:
    name: linknest-backend
  profiles:
    group:
      dev: [dev-config, commons, secret]
      prod: [prod-config, commons]
      test: [test-config, commons]

--- #commons 공통 설정
server:
  port: 8080
spring:
  config:
    activate:
      on-profile: commons
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 개발용, 운영 환경에서는 제거 예정
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        show_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-name: Google
            scope: [openid, email, profile]
          kakao:
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: [openid, profile_nickname, account_email]
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v1/oidc/userinfo
            issuer-uri: https://kauth.kakao.com
            jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
            user-name-attribute: sub

app:
  jwt:
    issuer: linknest
    audience: linknest-client
    access-exp-minutes: 15
    refresh-exp-days: 7
    header: Authorization
    prefix: Bearer
    clock-skew-seconds: 60
  tag-unused:
    enabled: false
    cron: "0 0 3 * * *"
    zone: "Asia/Seoul"
    batch-size: 500
    ttl-days: 1
  trash:
    enabled: true
    cron: "0 0 4 * * *"
    zone: "Asia/Seoul"
    batch-size: 300
    ttl-days: 15

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

--- #dev-config
spring:
  config:
    activate:
      on-profile: dev-config
  datasource:
    url: ${DB_URL}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: ${REDIS_TIMEOUT}

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: ${GOOGLE_REDIRECT_URI}
          kakao:
            redirect-uri: ${KAKAO_REDIRECT_URI}

app:
  frontend:
    oauth2-success-redirect: ${OAUTH2_SUCCESS_REDIRECT_URL}
  tag-unused:
    enabled: false
    # cron: "0 */1 * * * *" #테스트용
  trash:
    enabled: false
    # cron: "0 */1 * * * *" #테스트용

storage:
  provider: local
  local:
    base-path: ${LOCAL_STORAGE_BASE_PATH}
    base-url: ${LOCAL_STORAGE_BASE_URL}

logging:
  level:
    root: info
    org.springframework.web: info
    org.springframework.security: debug
    org.hibernate.SQL: warn
    org.hibernate.type: warn
    com.linknest: debug

--- #prod-config
spring:
  config:
    activate:
      on-profile: prod-config
  datasource:
    url: ${DB_URL}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      timeout: ${REDIS_TIMEOUT}
  flyway:
    clean-disabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: ${GOOGLE_REDIRECT_URI}
          kakao:
            redirect-uri: ${KAKAO_REDIRECT_URI}

app:
  frontend:
    oauth2-success-redirect: ${OAUTH2_SUCCESS_REDIRECT_URL}
  tag-unused:
    enabled: true
  trash:
    enabled: true

storage:
  provider: s3
  s3:
    bucket: ${S3_BUCKET}
    base-url: ${S3_BASE_URL}
    region: ${AWS_REGION}

logging:
  level:
    root: warn
    org.springframework.web: warn
    org.springframework.security: warn
    org.hibernate.SQL: warn
    org.hibernate.type: warn
    com.linknest: info