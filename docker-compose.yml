services:
  redis:
    image: redis:7.2
    container_name: linknest-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    restart: always

  mysql:
    image: mysql:8.4
    container_name: linknest-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=linknest
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: always

volumes:
  mysql-data:
  redis-data: